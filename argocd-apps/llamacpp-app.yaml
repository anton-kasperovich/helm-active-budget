apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llamacpp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anton-kasperovich/pi5-home-lab
    targetRevision: main
    path: apps/llamacpp
  destination:
    server: https://kubernetes.default.svc
    namespace: llama
  syncPolicy:
    automated:
      prune: true
      selfHeal: true